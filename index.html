<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨k-means 시뮬레이터✨</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f7f9fc;
            margin: 0;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }
        h2 { color: #333; margin-bottom: 5px; font-size: 1.5rem; }
        .description { color: #666; font-size: 13px; margin-bottom: 20px; text-align: center; }
        
        .container { 
            display: flex; 
            flex-direction: row;
            gap: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            background: white; 
            padding: 15px; 
            border-radius: 12px;
            max-width: 100%;
        }
        
        @media (max-width: 900px) {
            .container { flex-direction: column; align-items: center; }
            .control-panel { width: 100% !important; }
            .status-header { width: 100% !important; box-sizing: border-box; }
            canvas { width: 100% !important; height: auto !important; }
        }

        .control-panel { width: 230px; display: flex; flex-direction: column; gap: 12px; }
        
        .status-header {
            width: 596px; padding: 12px; margin-bottom: 8px; border-radius: 8px;
            background-color: #f1f5f9; text-align: center; font-weight: bold; font-size: 14px; color: #334155;
            border: 1px solid #e2e8f0; transition: all 0.3s;
        }
        
        canvas { 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            background-color: #fafbfc; 
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        .btn {
            padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-secondary { background-color: #10b981; color: white; }
        .btn-danger { background-color: #ef4444; color: white; }
        
        .mode-select {
            display: flex; flex-direction: column; gap: 8px; background: #f1f5f9; padding: 12px; border-radius: 8px;
        }
        label { font-size: 13px; font-weight: bold; color: #475569; }
        .radio-group { display: flex; gap: 8px; margin-top: 3px; font-size: 13px; align-items: center;}
        input[type="radio"] { width: 16px; height: 16px; margin: 0; }

        /* 📊 새로 추가된 실시간 데이터 통계창 스타일 */
        .stats-panel {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            color: #334155;
        }
        .stats-title { font-weight: bold; margin-bottom: 8px; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center; }
        .color-badge { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body>

    <h2>🏃‍♂️ 인공지능 k-means 시뮬레이터</h2>
    <div class="description">알고리즘에 따라 중심점이 어떻게 이동하는지 실험해 봅시다!</div>

    <div class="container">
        <div>
            <div class="status-header" id="statusHeader">📢 대기 중 (데이터와 중심점을 생성해 주세요)</div>
            <canvas id="kmeansCanvas" width="600" height="500"></canvas>
        </div>

        <div class="control-panel">
            <button class="btn btn-danger" onclick="resetAll()">🔄 처음부터 다시 (리셋)</button>
            <button class="btn btn-secondary" onclick="generateRandomData()">📊 랜덤 데이터 생성</button>
            
            <div class="mode-select">
                <label>📍 어떤 데이터를 생성할 건가요?</label>
                <div class="radio-group">
                    <input type="radio" id="modeData" name="clickMode" value="data" checked>
                    <label for="modeData">일반 데이터 점 찍기</label>
                </div>
                <div class="radio-group">
                    <input type="radio" id="modeCentroid" name="clickMode" value="centroid">
                    <label for="modeCentroid" style="color:#ef4444;">✨ 중심점 지정하기</label>
                </div>
            </div>

            <div class="mode-select">
                <label>🎯 중심점 지정 방식 설정</label>
                <div class="radio-group">
                    <input type="radio" id="initAnywhere" name="initMode" value="anywhere" checked>
                    <label for="initAnywhere">아무 빈 공간이나</label>
                </div>
                <div class="radio-group">
                    <input type="radio" id="initOnData" name="initMode" value="ondata">
                    <label for="initOnData">기존 데이터 위에</label>
                </div>
            </div>

            <div class="stats-panel">
                <div class="stats-title">📈 데이터 통계 현황</div>
                <div class="stats-row" style="font-weight: bold; margin-bottom: 8px;">
                    <span>총 데이터 수:</span> <span id="totalCount">0개</span>
                </div>
                <div id="clusterCounts">
                    <div style="color: #94a3b8; font-style: italic;">중심점을 생성하면 군집별 카운트가 표시됩니다.</div>
                </div>
            </div>

            <button class="btn btn-primary" id="stepBtn" onclick="handleStep()">▶️ 단계 진행</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('kmeansCanvas');
        const ctx = canvas.getContext('2d');
        
        let dataPoints = []; 
        let centroids = [];  
        const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6']; 
        const colorNames = ['빨간 군집', '파란 군집', '초록 군집', '노란 군집', '보라 군집'];
        
        let currentSubStep = 0; 
        let isConverged = false;
        let isDrawing = false;

        function resetAll() {
            dataPoints = [];
            centroids = [];
            currentSubStep = 0;
            isConverged = false;
            isDrawing = false;
            document.getElementById('modeData').checked = true;
            updateHeader("📢 대기 중 (데이터와 중심점을 생성해 주세요)", "#f1f5f9", "#334155");
            calculateStats();
            draw();
        }

        function generateRandomData() {
            resetAll();
            const groups = [
                {x: 150, y: 150}, {x: 450, y: 150}, {x: 300, y: 350}
            ];
            groups.forEach(g => {
                for(let i=0; i<15; i++) {
                    dataPoints.push({
                        x: g.x + (Math.random() - 0.5) * 120,
                        y: g.y + (Math.random() - 0.5) * 120,
                        cluster: -1
                    });
                }
            });
            updateHeader("📊 랜덤 데이터 생성 완료! 중심점을 찍어주세요.", "#e0f2fe", "#0369a1");
            calculateStats();
            draw();
        }

        function handleInput(clientX, clientY, isMoveEvent = false) {
            const rect = canvas.getBoundingClientRect();
            
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = (clientX - rect.left) * scaleX;
            const y = (clientY - rect.top) * scaleY;

            const clickMode = document.querySelector('input[name="clickMode"]:checked').value;
            const initMode = document.querySelector('input[name="initMode"]:checked').value;

            if (clickMode === 'data') {
                if (isMoveEvent && dataPoints.length > 0) {
                    const lastPoint = dataPoints[dataPoints.length - 1];
                    if (Math.hypot(lastPoint.x - x, lastPoint.y - y) < 15) return; 
                }
                dataPoints.push({ x: x, y: y, cluster: -1 });
                currentSubStep = 0;
                isConverged = false;
                updateHeader("📍 데이터 추가됨 (단계 진행을 누르면 처음부터 다시 정렬합니다)", "#f1f5f9", "#334155");
                calculateStats();
                draw();
            } else {
                if (isMoveEvent) return;
                if (centroids.length >= colors.length) {
                    alert("중심점은 최대 5개까지만 지원합니다.");
                    return;
                }

                if (initMode === 'ondata') {
                    if (dataPoints.length === 0) {
                        alert("선택할 수 있는 데이터가 없습니다.");
                        return;
                    }
                    let closest = null;
                    let minDist = Infinity;
                    dataPoints.forEach(p => {
                        let dist = Math.hypot(p.x - x, p.y - y);
                        if (dist < minDist && dist < 40) {
                            minDist = dist;
                            closest = p;
                        }
                    });

                    if (closest) {
                        if (centroids.some(c => c.x === closest.x && c.y === closest.y)) return;
                        centroids.push({ x: closest.x, y: closest.y, color: colors[centroids.length] });
                        updateHeader("🎯 기존 데이터 위치에 중심점 지정 완료!", "#fef3c7", "#b45309");
                    } else {
                        alert("데이터 점 위나 그 근처를 정확하게 터치해 주세요!");
                    }
                } else {
                    centroids.push({ x: x, y: y, color: colors[centroids.length] });
                    updateHeader("🎯 빈 공간에 새로운 중심점 지정 완료!", "#fef3c7", "#b45309");
                }
                currentSubStep = 0;
                isConverged = false;
                calculateStats();
                draw();
            }
        }

        // PC 마우스용 이벤트
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; handleInput(e.clientX, e.clientY, false); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) handleInput(e.clientX, e.clientY, true); });
        window.addEventListener('mouseup', () => { isDrawing = false; });

        // 패드/모바일 터치용 이벤트 
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY, false);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            handleInput(touch.clientX, touch.clientY, true); 
        }, { passive: false });

        window.addEventListener('touchend', () => { isDrawing = false; });

        function handleStep() {
            if (centroids.length === 0 || dataPoints.length === 0) {
                alert("데이터와 중심점이 모두 존재해야 합니다!");
                return;
            }
            if (isConverged) {
                updateHeader("✨ 알고리즘 완료 (최종 수렴 상태)", "#dcfce7", "#15803d");
                return;
            }

            if (currentSubStep === 0) {
                runAssignStep();
            } else {
                runMoveStep();
            }
        }

        // [할당 단계]
        function runAssignStep() {
            let changed = false;
            dataPoints.forEach(p => {
                let minDist = Infinity;
                let clusterIdx = -1;
                centroids.forEach((c, idx) => {
                    let dist = Math.hypot(p.x - c.x, p.y - c.y);
                    if (dist < minDist) {
                        minDist = dist;
                        clusterIdx = idx;
                    }
                });
                if (p.cluster !== clusterIdx) {
                    p.cluster = clusterIdx;
                    changed = true;
                }
            });

            calculateStats(); // 할당 직후 개수 리카운트 반영
            draw();

            if (!changed && dataPoints.every(p => p.cluster !== -1)) {
                isConverged = true;
                updateHeader("✨ [완료] 중심점 변경이 없으므로 알고리즘 최종 수렴!", "#dcfce7", "#15803d");
            } else {
                updateHeader("🔵 [1단계 완료] 가장 가까운 중심점으로 군집(색상) 할당", "#dbeafe", "#1d4ed8");
                currentSubStep = 1; 
            }
        }

        // [이동 단계]
        function runMoveStep() {
            centroids.forEach((c, idx) => {
                let sumX = 0, sumY = 0, count = 0;
                dataPoints.forEach(p => {
                    if (p.cluster === idx) {
                        sumX += p.x;
                        sumY += p.y;
                        count++;
                    }
                });

                if (count > 0) {
                    c.x = sumX / count;
                    c.y = sumY / count;
                }
            });

            draw();
            updateHeader("🟢 [2단계 완료] 데이터들의 평균 위치(무게중심)로 중심점 이동", "#dcfce7", "#15803d");
            currentSubStep = 0; 
        }

        // 📊 개수 실시간 집계 및 HTML 반영 함수
        function calculateStats() {
            document.getElementById('totalCount').innerText = `${dataPoints.length}개`;
            
            const container = document.getElementById('clusterCounts');
            if (centroids.length === 0) {
                container.innerHTML = `<div style="color: #94a3b8; font-style: italic;">중심점을 생성하면 군집별 카운트가 표시됩니다.</div>`;
                return;
            }

            // 군집별 개수 0으로 초기화
            let counts = Array(centroids.length).fill(0);
            let unassigned = 0;

            dataPoints.forEach(p => {
                if (p.cluster >= 0 && p.cluster < centroids.length) {
                    counts[p.cluster]++;
                } else {
                    unassigned++;
                }
            });

            let html = '';
            centroids.forEach((c, idx) => {
                html += `
                    <div class="stats-row">
                        <span><span class="color-badge" style="background:${c.color};"></span>${colorNames[idx]}:</span>
                        <strong>${counts[idx]}개</strong>
                    </div>
                `;
            });

            if (unassigned > 0) {
                html += `
                    <div class="stats-row" style="color: #94a3b8;">
                        <span><span class="color-badge" style="background:#94a3b8;"></span>미분류 데이터:</span>
                        <strong>${unassigned}개</strong>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            dataPoints.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = p.cluster === -1 ? '#94a3b8' : centroids[p.cluster].color;
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            centroids.forEach(c => {
                ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(c.x, c.y, 14, 0, 2 * Math.PI);
                ctx.fillStyle = c.color;
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(c.x, c.y, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function updateHeader(msg, bgColor, textColor) {
            const header = document.getElementById('statusHeader');
            header.innerHTML = msg;
            header.style.backgroundColor = bgColor;
            header.style.color = textColor;
        }

        resetAll();
    </script>
</body>
</html>
